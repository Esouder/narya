services:
  narya:
    image: ghcr.io/esouder/narya:latest
    container_name: narya-prod
    restart: unless-stopped
    network_mode: host
    environment:
      - LOG_LEVEL=INFO
      # SPI Configuration (all optional, these are defaults)
      - CS_PIN=8
      - SPI_BUS=0
      - SPI_DEVICE=0
      - SPI_CLOCK_HZ=5000000
      # Sensor Configuration
      - MAX_RETRIES=3
      # Server Configuration
      - HOST=0.0.0.0
      - PORT=8000
      - WORKERS=1
    # GPIO device mapping for Raspberry Pi
    devices:
      - /dev/spidev0.0:/dev/spidev0.0
      - /dev/mem:/dev/mem
    privileged: true
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
