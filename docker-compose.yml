services:
  narya:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: narya-dev
    ports:
      - "8000:8000"
    environment:
      - LOG_LEVEL=DEBUG
      # SPI Configuration
      - SPI_BUS=0
      - SPI_DEVICE=0
      - SPI_CLOCK_HZ=5000000
      # Sensor Configuration
      - MAX_RETRIES=3
      # Server Configuration
      - HOST=0.0.0.0
      - PORT=8000
      - WORKERS=1
    devices:
      - /dev/spidev0.0:/dev/spidev0.0
      - /dev/mem:/dev/mem
    volumes:
      - ./src:/app/src
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
