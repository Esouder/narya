services:
  narya:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: narya-dev
    ports:
      - "8000:8000"
    environment:
      - LOG_LEVEL=DEBUG
    command: python -m narya.main --host 0.0.0.0 --port 8000 --log-level DEBUG
    devices:
      - /dev/spidev0.0:/dev/spidev0.0
      - /dev/mem:/dev/mem
    volumes:
      - ./src:/app/src
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
